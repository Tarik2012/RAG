services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn rag_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
    command: celery -A rag_backend worker -l info --pool=solo

volumes:
  postgres_data:
  media_data:
